
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyefoster Scratch Coupon</title>
<style>
body{font-family:Arial; background:#000; color:#fff; text-align:center; padding:20px}
.card{max-width:350px; margin:auto; background:#111; padding:20px; border-radius:15px; box-shadow:0 0 10px rgba(255,165,0,0.5)}
h1{color:orange}
canvas{background:#ccc; border-radius:10px; cursor:pointer}
.details{font-size:12px; margin-top:10px}
</style>
</head>
<body>
<div class="card">
<h2>eyefoster.com</h2>
<h1>Scratch & Win</h1>
<p>DAREON & IMPLICIT Eyewear</p>
<canvas id="scratch" width="300" height="120"></canvas>
<p id="result" style="display:none; font-size:22px; color:orange;"></p>
<div class="details">
<p>Valid till: 15-07-2026</p>
<p>📞 8141417434</p>
<p>Krishna Darshan Complex, Jamnagar</p>
</div>
</div><script>
const discounts=[5,10,15,20,25,30,35];
const selected=discounts[Math.floor(Math.random()*discounts.length)];
const result=document.getElementById("result");
result.innerHTML="You Won "+selected+"% Discount!";

const canvas=document.getElementById("scratch");
const ctx=canvas.getContext("2d");
ctx.fillStyle="#999";
ctx.fillRect(0,0,300,120);
ctx.fillStyle="#000";
ctx.font="20px Arial";
ctx.fillText("Scratch Here",80,70);

canvas.addEventListener("mousemove",function(e){
 if(e.buttons===1){
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  ctx.clearRect(x-10,y-10,20,20);
 }
});

canvas.addEventListener("mouseup",()=>{
 result.style.display="block";
});
</script></body>
</html>
