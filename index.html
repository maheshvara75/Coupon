<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyefoster Scratch Coupon</title>
<style>
body{font-family:Arial; background:#000; color:#fff; text-align:center; padding:20px}
.card{max-width:350px; margin:auto; background:#111; padding:20px; border-radius:15px; box-shadow:0 0 15px rgba(255,165,0,0.6)}
h1{color:orange; margin-bottom:5px}
canvas{border-radius:10px; cursor:pointer; touch-action:none}
.details{font-size:12px; margin-top:10px}
</style>
</head>
<body>
<div class="card">
<h2>eyefoster.com</h2>
<h1>Scratch & Win</h1>
<p>DAREON & IMPLICIT Eyewear</p>

<div style="position:relative; display:inline-block;">
  <canvas id="bg" width="300" height="120"></canvas>
  <canvas id="scratch" width="300" height="120" style="position:absolute; left:0; top:0;"></canvas>
</div>

<div class="details">
<p>Valid till: 15-07-2026</p>
<p>📞 8141417434</p>
<p>Krishna Darshan Complex, Jamnagar</p>
</div>
</div>

<script>
// Weighted discount
const discounts=[5,5,5,10,10,15,20,25,30,35];
const selected=discounts[Math.floor(Math.random()*discounts.length)];

// Coupon code
const couponCode="EF"+Math.floor(100000+Math.random()*900000);

// BACKGROUND CANVAS (hidden reward)
const bg=document.getElementById("bg");
const bgCtx=bg.getContext("2d");

bgCtx.fillStyle="#222";
bgCtx.fillRect(0,0,300,120);

bgCtx.fillStyle="orange";
bgCtx.font="bold 24px Arial";
bgCtx.textAlign="center";
bgCtx.fillText(selected+"% OFF",150,55);

bgCtx.font="14px Arial";
bgCtx.fillText("Code: "+couponCode,150,85);

// SCRATCH LAYER
const canvas=document.getElementById("scratch");
const ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,300,120);
ctx.fillStyle="#000";
ctx.font="18px Arial";
ctx.textAlign="center";
ctx.fillText("Scratch Here",150,65);

let isDrawing=false;

function scratch(x,y){
 ctx.globalCompositeOperation='destination-out';
 ctx.beginPath();
 ctx.arc(x,y,15,0,Math.PI*2);
 ctx.fill();
}

// Desktop
canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",()=>isDrawing=false);
canvas.addEventListener("mousemove",(e)=>{
 if(!isDrawing) return;
 const rect=canvas.getBoundingClientRect();
 scratch(e.clientX-rect.left,e.clientY-rect.top);
});

// Mobile
canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",()=>isDrawing=false);
canvas.addEventListener("touchmove",(e)=>{
 e.preventDefault();
 const rect=canvas.getBoundingClientRect();
 const touch=e.touches[0];
 scratch(touch.clientX-rect.left,touch.clientY-rect.top);
});
</script>
</body>
</html>
